name: Build GradeMaster Electron App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install inside project
        run: npm install
        
      - name: Build Vite Frontend
        run: npm run build
        
      - name: Compile Windows Installer & Portable
        if: matrix.os == 'windows-latest'
        run: npx electron-builder build --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Compile macOS .dmg
        if: matrix.os == 'macos-latest'
        run: npx electron-builder build --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Compile Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder build --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Standalone Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GradeMaster-${{ matrix.os }}
          path: |
            dist-electron-v3/*.exe
            dist-electron-v3/*.dmg
            dist-electron-v3/*.AppImage
            dist-electron-v3/*.zip
